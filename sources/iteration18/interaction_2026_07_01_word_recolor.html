<!DOCTYPE html>

  <link rel="icon" type="image/svg+xml" href="assets/bb.svg">

<style id="litvar">
/* (3) words warm in over a beat */
.litw { transition: color .25s ease; }
/* the native selection fill is replaced by a hollow, corner-rounded garnet outline (drawn in JS) */
::selection { background: transparent; }
::-moz-selection { background: transparent; }
#lit-selbox { position: absolute; inset: 0; z-index: 13; pointer-events: none; }
.lit-selrect { position: absolute; border: 1.5px solid #1c1a16; border-radius: 5px; }

</style>

<body>
  <!-- The page's WORDS live outside this file: assets/content.en.js and assets/content.es.js
       hold every translatable string, one editable map per language. This file is the
       STRUCTURE; each translatable node carries data-i18n="key" and is filled by main.js from
       the active language's map. To change the site's text, edit the two content files — not
       the markup here. (Proper names, dates and GPAs that read the same in both languages stay
       inline below.) -->

        <path class="bulb-glass" d="M14 44a18 18 0 1 1 36 0c0 9-7 13-8 20H22c-1-7-8-11-8-20z" stroke="#1c1a16" stroke-width="3.2" stroke-linejoin="round"/>
        <path d="M22 64h20M23 70h18M25 76h14" fill="none" stroke="#1c1a16" stroke-width="3" stroke-linecap="round"/>

  <!-- The signet: the reconstructed circle + inscribed monogram. Fixed to the
       viewport, and layered ABOVE the page content so it reads as a solid mark
       floating over the page (the opaque ring occludes whatever scrolls behind). -->
  <div class="signet" aria-hidden="true">

      <!-- the reconstructed circle: thick black baseline. It IS the bb logo's
           enclosing annulus (see assets/bb.svg) — same centre, radius and
           thickness, mapped into this 0..400 viewBox. The points illuminate the
           arcs they can see (lit gold bands painted on .reflect-canvas). -->
      <circle class="signet__circle" cx="200" cy="200" r="120"
              fill="none" stroke="#1c1a16" stroke-width="17.5370" opacity="1"/>
    </svg>
  </div>

  <!-- The monogram, on its own layer above the dots and their illumination. The
       two b's behave as solid forms slightly above the lights: only boundary
       segments whose outward normal faces an interior light catch a reflection

  <div class="signet signet--top" aria-hidden="true">

<script>
(function(){
"use strict";
const LIT_VARIANT="word_recolor (archived)";
// ---- shared text-light scaffolding (injected before each variant's body) ----
const API = window.LITAPI;
let units = [];            // a variant's lit units (block elements or word spans), page-space rects
let prepped = false;       // (re)built lazily on first call and after every 'litrelayout'
window.addEventListener("litrelayout", () => { prepped = false; });

// strongest light reaching a viewport point: max over lights of intensity·falloff
function litAt(x, y, lights) {
  let m = 0;
  for (const L of lights) {
    const d = Math.hypot(L.x - x, L.y - y);
    if (d < L.r) { const v = L.i * API.glowFalloff(d / L.r); if (v > m) m = v; }
  }
  return m;
}
// page-space rects for the target blocks (origin in page coords, so scroll-invariant)
function cacheBlocks() {
  const sx = scrollX, sy = scrollY;
  return API.targets().map(el => {
    const r = el.getBoundingClientRect();
    return { el, px: r.left + sx, py: r.top + sy, w: r.width, h: r.height };
  });
}
// a small corner badge naming the build you're looking at
(function () {
  const b = document.createElement("div");
  b.textContent = "text-light · " + LIT_VARIANT;
  b.style.cssText = "position:fixed;left:8px;bottom:8px;z-index:99;font:600 11px/1 ui-monospace,monospace;" +
    "color:#1c1a16;background:rgba(255,255,255,.72);padding:5px 8px;border-radius:5px;pointer-events:none;letter-spacing:.02em";
  document.body.appendChild(b);
})();

// (3) PER-WORD RECOLOUR — three gold shades by distance to the whole word, + illumination-based
// text HIGHLIGHTING. Distance to a light is the distance to the word's baseline SEGMENT p0→p1
// (capsule rule), so a light by the last letter lights the whole word. Three shades over disk thirds
// [0,R/3]/[R/3,2R/3]/[2R/3,R]. Colours rechosen so the outer shade is clearly gold, not black.
// Highlighting: click a word to light it gold (and its neighbours by the same scheme); click again to
// clear. Selecting text lights every word in the selection gold + neighbours, and the native
// selection box is replaced by a hollow, corner-rounded garnet outline.
const SHADE = ["", "rgb(150,105,22)", "rgb(250,208,42)"];   // ink · darkened gold · gold  (two shades, cleaner)
const CLICK_R = 220;                          // a click/selection illuminates neighbours out to here (R/3, 2R/3)
const clicked = new Set();                    // toggled words (persistent)
let selected = new Set();                     // words under the current selection (transient)
let lastLights = [], lastF = { sx: 0, sy: 0 };
let selOverlay = null;

function wrapWords(el) {
  if (el.dataset.litWrapped) return;
  const texts = [], walk = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  for (let n; (n = walk.nextNode()); ) if (n.nodeValue.trim()) texts.push(n);
  for (const t of texts) {
    const frag = document.createDocumentFragment();
    for (const part of t.nodeValue.split(/(\s+)/)) {
      if (!part) continue;
      if (/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
      else { const s = document.createElement("span"); s.className = "litw"; s.textContent = part; frag.appendChild(s); }
    }
    t.parentNode.replaceChild(frag, t);
  }
  el.dataset.litWrapped = "1";
}
function prep() {
  for (const el of API.targets()) wrapWords(el);
  if (!selOverlay) { selOverlay = document.createElement("div"); selOverlay.id = "lit-selbox"; document.body.appendChild(selOverlay); }
  const sx = scrollX, sy = scrollY;
  units = [...document.querySelectorAll(".litw")].map(s => {
    const segs = [...s.getClientRects()].map(r => ({ x0: r.left + sx, x1: r.right + sx, y: (r.top + r.bottom) / 2 + sy }));
    const first = segs[0] || { x0: 0, x1: 0, y: 0 }, last = segs[segs.length - 1] || first;
    return { el: s, segs, cx: (first.x0 + last.x1) / 2, cy: first.y, lvl: -1 };
  });
  prepped = true;
}
function distSeg(px, py, s) { return px < s.x0 ? Math.hypot(px - s.x0, py - s.y) : px > s.x1 ? Math.hypot(px - s.x1, py - s.y) : Math.abs(py - s.y); }
function distToWord(px, py, u) { let d = Infinity; for (const s of u.segs) { const dd = distSeg(px, py, s); if (dd < d) d = dd; } return d; }
function recolor() {
  const PL = lastLights.map(L => ({ x: L.x + lastF.sx, y: L.y + lastF.sy, r: L.r }));   // point lights -> page space
  const actives = [];
  for (const u of units) if (clicked.has(u.el) || selected.has(u.el)) actives.push(u);
  for (const u of units) {
    let best = (clicked.has(u.el) || selected.has(u.el)) ? 2 : 0;   // clicked/selected word -> gold
    if (best < 2) {
      for (const L of PL) { const d = distToWord(L.x, L.y, u); const reg = d < L.r / 2 ? 2 : d < L.r ? 1 : 0; if (reg > best) best = reg; }
      for (const a of actives) { if (distToWord(a.cx, a.cy, u) < CLICK_R && best < 1) best = 1; }   // a neighbour of an active word -> darkened
    }
    if (best === u.lvl) continue; u.lvl = best;
    u.el.style.color = SHADE[best];
  }
}
window.TEXT_LIGHT = function (lights, f) { if (!prepped) prep(); lastLights = lights; lastF = f; recolor(); };

// click a word to toggle its highlight (ignoring clicks that were really the end of a drag-select, and links)
document.addEventListener("click", e => {
  const w = e.target.closest && e.target.closest(".litw");
  if (!w || (e.target.closest && e.target.closest("a")) || !getSelection().isCollapsed) return;
  if (clicked.has(w)) clicked.delete(w); else clicked.add(w);
  recolor();
});
// selection -> light the selected words + draw the garnet outline
let selRAF = 0;
document.addEventListener("selectionchange", () => { if (!selRAF) selRAF = requestAnimationFrame(() => { selRAF = 0; updateSelection(); }); });
function updateSelection() {
  const sel = getSelection();
  selected = new Set();
  if (selOverlay) selOverlay.textContent = "";
  if (sel && sel.rangeCount && !sel.isCollapsed) {
    const range = sel.getRangeAt(0);
    for (const u of units) if (range.intersectsNode(u.el)) selected.add(u.el);
    const sx = scrollX, sy = scrollY, lines = [];
    for (const r of range.getClientRects()) {         // merge the per-word rects into one box per line
      if (r.width < 1 || r.height < 1) continue;
      const g = lines.find(L => Math.abs(L.top - r.top) < 4 && Math.abs(L.bottom - r.bottom) < 6);
      if (g) { g.left = Math.min(g.left, r.left); g.right = Math.max(g.right, r.right); g.top = Math.min(g.top, r.top); g.bottom = Math.max(g.bottom, r.bottom); }
      else lines.push({ left: r.left, right: r.right, top: r.top, bottom: r.bottom });
    }
    for (const L of lines) {
      const d = document.createElement("div"); d.className = "lit-selrect";
      d.style.cssText = "left:" + (L.left + sx - 3) + "px;top:" + (L.top + sy - 1) + "px;width:" + (L.right - L.left + 6) + "px;height:" + (L.bottom - L.top + 2) + "px;";
      selOverlay.appendChild(d);
    }
  }
  recolor();
}

})();
</script>
