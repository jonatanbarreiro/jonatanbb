<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- the layout never squeezes under 780px: a phone gets the desktop composition,
       scaled to its screen —about 2x its native width— instead of a thread-thin
       reflow (desktop ignores this) -->

  <title>Jonatan Barreiro</title>
  <meta name="description" content="Jonatan —mathematician and predoctoral researcher. Geometry, point clouds, and detection methods.">
  <link rel="canonical" href="https://jonatanbb.xyz/">
  <!-- social preview cards (Open Graph + Twitter); title/description mirror the ones above -->
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://jonatanbb.xyz/">
  <meta property="og:title" content="Jonatan Barreiro">
  <meta property="og:description" content="Jonatan —mathematician and predoctoral researcher. Geometry, point clouds, and detection methods.">
  <!-- the share-card image is the logo itself, lit from its centre point, on a
       transparent background —so a shared link carries the mark, not a face -->
  <meta property="og:image" content="https://jonatanbb.xyz/assets/bb-card.png">
  <meta property="og:image:width" content="1000">
  <meta property="og:image:height" content="1000">
  <meta property="og:image:alt" content="The bb monogram of jonatanbb.xyz, lit up by the point at its centre">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Jonatan Barreiro">
  <meta name="twitter:description" content="Jonatan —mathematician and predoctoral researcher. Geometry, point clouds, and detection methods.">
  <meta name="twitter:image" content="https://jonatanbb.xyz/assets/bb-card.png">
  <link rel="icon" type="image/svg+xml" href="assets/bb.svg">
  <link rel="stylesheet" href="styles.css">
  <!-- who this page is about, for search engines -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jonatan Barreiro Bastos",
    "url": "https://jonatanbb.xyz/",
    "image": "https://jonatanbb.xyz/assets/portrait.jpg",
    "jobTitle": "Mathematician · Predoctoral researcher",
    "affiliation": {
      "@type": "Organization",
      "name": "CiTIUS —Centro de Investigación en Tecnoloxías Intelixentes",
      "url": "https://citius.gal/",
      "parentOrganization": {
        "@type": "CollegeOrUniversity",
        "name": "Universidade de Santiago de Compostela"
      }
    },
    "sameAs": [
      "https://orcid.org/0000-0003-0922-8055",
      "https://github.com/jonatanbarreiro"
    ]
  }
  </script>
</head>
<body>
  <!-- The page's WORDS live outside this file: assets/content.en.js and assets/content.es.js
       hold every translatable string, one editable map per language. This file is the
       STRUCTURE; each translatable node carries data-i18n="key" and is filled by main.js from
       the active language's map. To change the site's text, edit the two content files —not
       the markup here. (Proper names, dates and GPAs that read the same in both languages stay
       inline below.) -->

  <!-- Skip link for keyboard users -->
  <a class="skip" href="#main" data-i18n="skip"></a>

  <!-- top-right controls: the master light toggle (B2 bulb) on the LEFT, the
       day/night toggle in the middle, the EN/ES language switch (L1 pill) on the
       RIGHT. All fixed to the viewport and riding along as you scroll, so any of
       them can be reached from anywhere down the page. -->
  <div class="controls" id="controls">
    <button class="bulb-toggle" id="bulb-toggle" type="button" aria-pressed="true" aria-label="Turn the light off">
      <svg viewBox="0 0 64 100" aria-hidden="true">
        <defs>
          <radialGradient id="bulbGlow" cx="50%" cy="36%" r="62%">
            <!-- the glow rides the build's ambient colour (--glow in styles.css) -->
            <stop offset="0" style="stop-color:var(--glow)" stop-opacity=".55"/>
            <stop offset="55%" style="stop-color:var(--glow)" stop-opacity=".12"/>
            <stop offset="100%" style="stop-color:var(--glow)" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle class="bulb-glow" cx="32" cy="36" r="46" fill="url(#bulbGlow)"/>
        <path class="bulb-glass" d="M14 44a18 18 0 1 1 36 0c0 9-7 13-8 20H22c-1-7-8-11-8-20z" stroke="#1c1a16" stroke-width="3.2" stroke-linejoin="round"/>
        <path d="M22 64h20M23 70h18M25 76h14" fill="none" stroke="#1c1a16" stroke-width="3" stroke-linecap="round"/>
        <path class="bulb-fil" d="M26 40c2-6 4-6 6 0s4 6 6 0" fill="none" stroke="#1c1a16" stroke-width="2.2"/>
      </svg>
    </button>
    <!-- the night toggle: a mitred-ray sun by day, a crescent by night. The moon
         wears the same glow gold as the sun (a light motif, not an ink one). -->
    <button class="night-toggle" id="night-toggle" type="button" aria-pressed="false" aria-label="Switch to night mode">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <g class="tg-day">
          <path id="t1ray" d="M24 1.5 21.3 8.5 h5.4 Z" fill="currentColor"/>
          <use href="#t1ray" transform="rotate(45 24 24)"/><use href="#t1ray" transform="rotate(90 24 24)"/>
          <use href="#t1ray" transform="rotate(135 24 24)"/><use href="#t1ray" transform="rotate(180 24 24)"/>
          <use href="#t1ray" transform="rotate(225 24 24)"/><use href="#t1ray" transform="rotate(270 24 24)"/>
          <use href="#t1ray" transform="rotate(315 24 24)"/>
          <circle cx="24" cy="24" r="8.5" fill="var(--glow)" stroke="currentColor" stroke-width="3"/>
        </g>
        <g class="tg-night">
          <path d="M30.5 6.5 A19 19 0 1 0 30.5 41.5 A15 15 0 1 1 30.5 6.5 Z"
                fill="var(--glow)" stroke="currentColor" stroke-width="2.6" stroke-linejoin="miter"/>
        </g>
      </svg>
    </button>
    <button class="lang-switch" id="lang-switch" type="button" aria-pressed="false" aria-label="Cambiar a español">
      <svg viewBox="0 0 104 48" aria-hidden="true">
        <path class="pill-left"  d="M52 2 H24 A22 22 0 0 0 24 46 H52 Z"/>
        <path class="pill-right" d="M52 2 H80 A22 22 0 0 1 80 46 H52 Z"/>
        <rect x="2" y="2" width="100" height="44" rx="22" fill="none" stroke="#1c1a16" stroke-width="3"/>
        <line x1="52" y1="2" x2="52" y2="46" stroke="#1c1a16" stroke-width="2.4"/>
        <text class="pill-en" x="27" y="31" text-anchor="middle">EN</text>
        <text class="pill-es" x="77" y="31" text-anchor="middle">ES</text>
      </svg>
    </button>
  </div>

  <!-- Cast light: the soft RADIAL glow each point throws (out to the annulus' inner
       radius), plus the gold words' own elliptical glow. Ambient light behind the
       content, clipped out of the logo disc; painted by main.js each frame. -->
  <canvas class="cast-canvas" id="cast-canvas" aria-hidden="true"></canvas>

  <!-- The cracks: a radial-flow tree of the sample field, rooted at the i-dot
       —each point joins the graph through the parent that sees it closest to its own
       radial direction —each link a compass-walk crack. Invisible at rest; they
       light as the ignition wave passes and ember-cool away behind it. Painted by
       main.js. -->
  <canvas class="crack-canvas" id="crack-canvas" aria-hidden="true"></canvas>

  <!-- Sample field: a sparse handful of points anchored to the page, scattered
       freshly on each load by main.js (density-driven, ~9 on the content column),
       plus the hardcoded ones (the centre dot and the i-dot). -->
  <div class="points" aria-hidden="true"></div>

  <!-- The signet: the reconstructed circle + inscribed monogram. Fixed to the
       viewport, and layered ABOVE the page content so it reads as a solid mark
       floating over the page (the opaque ring occludes whatever scrolls behind). -->
  <div class="signet" aria-hidden="true">
    <svg viewBox="0 0 400 400" class="signet__svg" id="signet-svg">
      <!-- the reconstructed circle: thick black baseline. It IS the bb logo's
           enclosing annulus (see assets/bb.svg) —same centre, radius and
           thickness, mapped into this 0..400 viewBox. The points illuminate the
           arcs they can see (lit gold bands painted on .reflect-canvas). -->
      <circle class="signet__circle" cx="200" cy="200" r="120"
              fill="none" stroke="#1c1a16" stroke-width="17.5370" opacity="1"/>
    </svg>
  </div>

  <!-- The monogram, on its own layer above the dots and their illumination. The
       two b's behave as solid forms slightly above the lights: only boundary
       segments whose outward normal faces an interior light catch a reflection
       (painted on .reflect-canvas by main.js). -->
  <div class="signet signet--top" aria-hidden="true">
    <svg viewBox="0 0 400 400" class="signet__svg">
      <defs>
        <path id="bb-b" d="M27.5 86.5 21 93 V58 L49.5 86.5 0 136 V1.445 L4.856 8.7"
              fill="none" stroke-width="10.5" stroke-linecap="butt"
              stroke-linejoin="miter" stroke-miterlimit="6"/>
      </defs>
      <!-- mapped so the bb annulus (centre 107.637,168.3; mid-radius 143.696,
           ring thickness 21) lands on the circle above (centre 200,200; r 120):
           K = 120/143.696 -->
      <g class="signet__mark" stroke="#1c1a16"
         transform="translate(200 200) scale(0.835096) translate(-107.637 -168.3)">
        <use href="#bb-b" transform="translate(44.6 81.8)"/>
        <use href="#bb-b" transform="translate(119 57.75)"/>
      </g>
    </svg>
  </div>

  <!-- reflection glints + lit boundary bands, painted by main.js (blurred) -->
  <canvas class="reflect-canvas" id="reflect-canvas" aria-hidden="true"></canvas>

  <!-- "WILLING TO WORK", carved into the ring on the arc facing the screen centre.
       This is a layer of REAL DOM TEXT (one <span> per letter), NOT a canvas: each letter
       is positioned + rotated onto the ring by main.js and recoloured by the light on its
       own arc —incandescent, dark wine when barely lit to hot orange when fully lit. Kept
       above the bands so its lighting never falls behind the ring. -->
  <div class="ring-letters" id="ring-letters" aria-hidden="true"></div>

  <!-- The ignition pulse: the expanding ring of light the i-dot throws on load to
       wake the field. Drawn by main.js only during the load sequence, on the very
       top layer so the pulse sweeps over the whole page (content and images). -->
  <canvas class="pulse-canvas" id="pulse-canvas" aria-hidden="true"></canvas>

  <main id="main">
    <!-- ============ HERO ============ -->
    <section class="hero" id="top">
      <div class="hero__inner">
        <div class="hero__text">
          <p class="eyebrow" data-i18n="eyebrow"></p>
          <h1 class="hero__name"><span class="hero__given">Jonatan</span> <span class="hero__sur">Barre<span class="hero__i">i<i class="hero__i-base" aria-hidden="true"></i></span>ro Bastos</span></h1>
          <!-- invisible float sized by main.js to the logo's band: the lede wraps the
               logo where it hangs and runs wide beneath it -->
          <div class="hero__lede-clear" aria-hidden="true"></div>
          <p class="hero__lede" data-i18n="lede"></p>
        </div>
      </div>
    </section>

    <!-- ============ ABOUT ============ -->
    <section class="band" id="about">
      <div class="section">
        <p class="kicker" data-i18n="k_about"></p>
        <div class="about__body">
          <p data-i18n="ab1"></p>
          <!-- the photo sits below the opening paragraph, floating left with the second
               and third to its right. assets/portrait.png is the cutout of the PAKO set's
               pick (background lifted, so the page —day or night— shows through; the
               original flat-white portrait.jpg stays beside it for the JSON-LD card).
               The hooked frame ink (an SVG) is built inside this box by main.js. -->
          <div class="about__photo">
            <img src="assets/portrait.png" alt="Jonatan Barreiro Bastos" width="600" height="800">
          </div>
          <p data-i18n="ab2"></p>
          <p data-i18n="ab3"></p>
        </div>
      </div>
    </section>

    <!-- ============ EXPERIENCE ============ -->
    <section class="band" id="experience">
      <div class="section">
        <p class="kicker" data-i18n="k_exp"></p>
        <ol class="timeline">
          <li class="entry">
            <div class="entry__when">2021 — 2025</div>
            <div class="entry__what">
              <h3 data-i18n="e1t"></h3>
              <p class="entry__org" data-i18n="e1o"></p>
              <p class="entry__detail" data-i18n="e1d"></p>
            </div>
          </li>
          <li class="entry">
            <div class="entry__when">2018 — 2019</div>
            <div class="entry__what">
              <h3 data-i18n="gta"></h3>
              <p class="entry__org" data-i18n="uok"></p>
              <!-- one GTA position, told a semester per paragraph: winter, then spring -->
              <p class="entry__detail" data-i18n="e2d"></p>
              <p class="entry__detail" data-i18n="e3d"></p>
            </div>
          </li>
          <li class="entry">
            <div class="entry__when">2017 — 2018</div>
            <div class="entry__what">
              <h3 data-i18n="e4t"></h3>
              <p class="entry__org" data-i18n="uok"></p>
              <p class="entry__detail" data-i18n="e4d"></p>
            </div>
          </li>
        </ol>
      </div>
    </section>

    <!-- ============ EDUCATION ============ -->
    <section class="band" id="education">
      <div class="section">
        <p class="kicker" data-i18n="k_edu"></p>
        <ol class="timeline">
          <li class="entry">
            <div class="entry__when">2017 — 2020</div>
            <div class="entry__what">
              <h3 data-i18n="ed1t"></h3>
              <p class="entry__org" data-i18n="ed1o"></p>
              <p class="entry__detail" data-i18n="ed1d"></p>
            </div>
          </li>
          <li class="entry">
            <div class="entry__when">2015 — 2016</div>
            <div class="entry__what">
              <h3 data-i18n="ed2t"></h3>
              <p class="entry__org" data-i18n="ed2o"></p>
              <p class="entry__detail" data-i18n="ed2d"></p>
            </div>
          </li>
          <li class="entry">
            <div class="entry__when">2011 — 2015</div>
            <div class="entry__what">
              <h3 data-i18n="ed3t"></h3>
              <p class="entry__org" data-i18n="ed3o"></p>
              <p class="entry__detail" data-i18n="ed3d"></p>
            </div>
          </li>
        </ol>
      </div>
    </section>

    <!-- ============ WRITING / PUBLICATIONS ============ -->
    <section class="band" id="publications">
      <div class="section">
        <p class="kicker" data-i18n="k_pub"></p>
        <div class="pubs">
          <!-- what's on the desk right now (the article being written + this site),
               told in prose; the box below is reserved for published work -->
          <p class="pubs__intro" data-i18n="pubintro"></p>
          <article class="pub">
            <h3 class="pub__title" data-i18n="p2t"></h3>
            <p class="pub__meta" data-i18n="p2m"></p>
            <p class="pub__note" data-i18n="p2n"></p>
            <p class="pub__links" data-i18n="p2l"></p>
          </article>
          <p class="pub__orcid" data-i18n="orcid"></p>
        </div>
      </div>
    </section>

    <!-- ============ SKILLS ============ -->
    <section class="band" id="skills">
      <div class="section">
        <p class="kicker" data-i18n="k_skills"></p>
        <div class="skills">
          <div class="skills__col">
            <h3 data-i18n="sk_prog"></h3>
            <ul class="chips">
              <li class="chip chip--lit">LaTeX</li>
              <li class="chip chip--lit">Sage</li>
              <li class="chip chip--lit">C++</li>
              <li class="chip chip--lit">Python</li>
              <li class="chip chip--dim">C</li>
              <li class="chip chip--dim">Java</li>
              <li class="chip chip--dim">MATLAB</li>
              <li class="chip chip--dim">R</li>
            </ul>
          </div>
          <div class="skills__col">
            <h3 data-i18n="sk_lang"></h3>
            <!-- presentation A (grouped by level): the level leads, the languages follow.
                 Unambiguous and two lines; no chip-glow coding. -->
            <dl class="langs-grouped">
              <div><dt data-i18n="lvl_native"></dt><dd><span data-i18n="lang_es"></span>, <span data-i18n="lang_gl"></span></dd></div>
              <div><dt data-i18n="lvl_fluent"></dt><dd><span data-i18n="lang_en"></span></dd></div>
            </dl>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ CONTACT ============ -->
    <section class="band" id="contact">
      <div class="section section--contact">
        <h2 class="contact__head" data-i18n="chead"></h2>
        <ul class="contact__links">
          <li>
            <a class="contact__icon" href="mailto:jonatanbb@tutanota.com" aria-label="Email (Tuta) —jonatanbb@tutanota.com">
              <!-- the Tuta brand mark, traced as line-art to match the Telegram plane and the b's:
                   the three parts of the logo drawn as their boundaries —the left triangle (3 corners),
                   the roof bar (4 corners) and the forward-leaning "M" (13 corners). Corners read off the
                   hand-dotted reference capture (Jonatan marked every vertex), then mapped uniformly into
                   the box —so the four M sticks share one thickness, the central valley sits at its true
                   depth, and the bar carries its real height. The three parts are then nudged apart along
                   their shared edges (each rigidly, shapes untouched) so the bands between them —all equal—
                  open into a clear separating gap. -->
              <!-- miterlimit 6: keeps every M cusp sharply mitred while clipping the long spike the
                   triangle's very acute bottom vertex would otherwise throw past its tip -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="6" aria-hidden="true">
                <path d="M1.16 3.45 4.52 6.81 1.16 18.15Z"/>
                <path d="M2.88 1.38 18.84 1.38 22.62 5.16 6.66 5.16Z"/>
                <path d="M2.56 22.56 7.18 7.86 10.12 7.86 12.64 14.58 19.36 7.86 22.30 7.86 18.10 22.56 14.74 22.56 17.68 13.32 13.06 17.52 10.96 17.52 8.86 13.32 5.92 22.56Z"/>
              </svg>
            </a>
          </li>
          <li>
            <a class="contact__icon" href="https://t.me/jonatanbb" rel="me" aria-label="Telegram —@jonatanbb">
              <!-- the Telegram plane, line-art with its four salient tips sharp: no
                   rounding fillets —each tip is the true mitred vertex where its
                   two edges meet (like the b's) -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="8" aria-hidden="true">
                <path d="M22.73 3.79 1.29 12.04 7.3 14 9.36 20.41 12.6 17.3 17.94 21.25Z"/>
                <path d="M7.3 14 18.5 7 9.4 15.4"/>
              </svg>
            </a>
          </li>
          <!-- GitHub: live once there's a public repo to show.
               Uncomment when ready:
          <li><a href="https://github.com/jonatanbarreiro" rel="me">GitHub</a></li>
          -->
        </ul>
      </div>
    </section>
  </main>

  <footer class="foot">
    <p>© <span id="year"></span> Jonatan Barreiro Bastos · <span data-i18n="foot"></span></p>
  </footer>

  <!-- the page's text, one editable file per language, loaded before main.js applies it -->
  <script src="assets/content.en.js"></script>
  <script src="assets/content.es.js"></script>
  <script src="main.js"></script>
  <!-- the reflective lighting layer: illuminating points lighting the page copy (see reflect.js) -->
  <script src="reflect.js"></script>
</body>
</html>
