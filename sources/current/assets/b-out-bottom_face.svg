<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18.5 -29 88.5 191">
<!--
  b-out-bottom_face.svg — exterior lighting, the bounding triangle's BOTTOM edge (8-9).
  The illuminating point sits in the shaded half-plane beyond this edge; the
  elements it lights (their outer faces) are painted white. Convention and
  coordinates: illumination.txt (same folder).
-->
  <defs>
    <polygon id="b-silhouette" points="26.2500,85.2500 26.2500,70.6746 42.0754,86.5000 5.2500,123.3254 5.2500,8.4363 9.2189,5.7798 -5.2500,-15.8371 -5.2500,148.6746 56.9246,86.5000 15.7500,45.3254 15.7500,105.6746 31.2123,90.2123"/>
  </defs>

  <!-- the 18 elements, grouped by piece -->
  <g data-piece="top tip">
    <polygon id="toptip-left" fill="hsl(354,61%,36.5%)" points="-5.2500,-15.8371 5.2500,8.4363 -5.2500,8.4363"/>
    <polygon id="toptip-right" fill="hsl(354,61%,45%)" points="5.2500,8.4363 9.2189,5.7798 -5.2500,-15.8371"/>
  </g>
  <g data-piece="stick 1 (the stem)">
    <polygon id="stick1-left" fill="hsl(354,61%,36.5%)" points="-5.2500,8.4363 0.0000,8.4363 0.0000,123.3254 -5.2500,123.3254"/>
    <polygon id="stick1-right" fill="hsl(354,61%,45%)" points="0.0000,8.4363 5.2500,8.4363 5.2500,123.3254 0.0000,123.3254"/>
  </g>
  <g data-piece="joint 1">
    <polygon id="joint1-left" fill="hsl(354,61%,36.5%)" points="5.2500,123.3254 -5.2500,148.6746 -5.2500,123.3254"/>
    <polygon id="joint1-right" fill="hsl(354,61%,45%)" points="5.2500,123.3254 12.6746,130.7500 -5.2500,148.6746"/>
  </g>
  <g data-piece="stick 2">
    <polygon id="stick2-left" fill="hsl(354,61%,36.5%)" points="5.2500,123.3254 42.0754,86.5000 45.7877,90.2123 8.9623,127.0377"/>
    <polygon id="stick2-right" fill="hsl(354,61%,45%)" points="8.9623,127.0377 45.7877,90.2123 49.5000,93.9246 12.6746,130.7500"/>
  </g>
  <g data-piece="joint 2 (middle joint)">
    <polygon id="joint2-right" fill="hsl(354,61%,45%)" points="49.5000,79.0754 42.0754,86.5000 56.9246,86.5000"/>
    <polygon id="joint2-left" fill="hsl(354,61%,36.5%)" points="49.5000,93.9246 56.9246,86.5000 42.0754,86.5000"/>
  </g>
  <g data-piece="stick 3">
    <polygon id="stick3-left" fill="hsl(354,61%,36.5%)" points="42.0754,86.5000 45.7877,82.7877 29.9623,66.9623 26.2500,70.6746"/>
    <polygon id="stick3-right" fill="hsl(354,61%,45%)" points="45.7877,82.7877 49.5000,79.0754 33.6746,63.2500 29.9623,66.9623"/>
  </g>
  <g data-piece="joint 3 (last joint)">
    <polygon id="joint3-left" fill="hsl(354,61%,36.5%)" points="26.2500,70.6746 15.7500,45.3254 15.7500,70.6746"/>
    <polygon id="joint3-right" fill="hsl(354,61%,45%)" points="26.2500,70.6746 33.6746,63.2500 15.7500,45.3254"/>
  </g>
  <g data-piece="stick 4 (last, shorter)">
    <polygon id="stick4-left" fill="hsl(354,61%,36.5%)" points="15.7500,70.6746 21.0000,70.6746 21.0000,85.2500 15.7500,85.2500"/>
    <polygon id="stick4-right" fill="hsl(354,61%,45%)" points="26.2500,85.2500 26.2500,70.6746 21.0000,70.6746 21.0000,85.2500"/>
  </g>
  <g data-piece="inner tip">
    <polygon id="innertip-left" fill="hsl(354,61%,36.5%)" points="26.2500,85.2500 15.7500,85.2500 15.7500,105.6746"/>
    <polygon id="innertip-right" fill="hsl(354,61%,45%)" points="26.2500,85.2500 15.7500,105.6746 31.2123,90.2123"/>
  </g>

  <use href="#b-silhouette" fill="none" stroke="#1a1a1a" stroke-width="0.5" stroke-linejoin="miter" stroke-miterlimit="6"/>

  <!-- the bounding triangle (dashed), the lit half-plane, the active (bottom) edge -->
  <g data-layer="exterior">
    <polygon id="half-plane-bottom" fill="#e8c24a" fill-opacity="0.25" stroke="none" points="-5.2500,148.6746 56.9246,86.5000 70,73.4246 70,162 -18.5,162 -18.5,161.9246"/>
    <polygon id="bounding-triangle" fill="none" stroke="#e8c24a" stroke-width="0.4" stroke-dasharray="2 1.5" points="-5.2500,-15.8371 -5.2500,148.6746 56.9246,86.5000"/>
    <line id="edge-bottom" x1="-5.2500" y1="148.6746" x2="56.9246" y2="86.5000" stroke="#e8c24a" stroke-width="0.9"/>
  </g>

  <!-- elements lit from this half-plane, painted white on top -->
  <g data-layer="lit" fill="#ffffff" stroke="#333333" stroke-width="0.3" stroke-linejoin="round">
    <polygon id="lit-joint1-right" points="5.2500,123.3254 12.6746,130.7500 -5.2500,148.6746"/>
    <polygon id="lit-stick2-right" points="8.9623,127.0377 45.7877,90.2123 49.5000,93.9246 12.6746,130.7500"/>
    <polygon id="lit-joint2-left" points="49.5000,93.9246 56.9246,86.5000 42.0754,86.5000"/>
  </g>
</svg>
