          fill="none" stroke-width="10.5" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="6"/>
  </defs>
  <circle cx="107.637" cy="168.3" r="138.446" fill="none" stroke="#e8a317" stroke-width="10.5"/>
  <use href="#b" transform="translate(44.6 81.8)" stroke="#e8a317"/>
