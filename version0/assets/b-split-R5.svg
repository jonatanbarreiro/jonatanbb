<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.5 -19 68.5 171">
<!--
  b-split-R5.svg — R5 view of b-split.svg (see that file for full docs).
  R5 is shown solid red; the other regions stay translucent. The faces
  lit when the illuminating point sits in R5 are painted white:
    side1-right, side2-end, side3-inner, tipbelly-right
-->
  <defs>
    <polygon id="b-silhouette" points="26.2500,85.2500 26.2500,70.6746 42.0754,86.5000 5.2500,123.3254 5.2500,8.4363 9.2189,5.7798 -5.2500,-15.8371 -5.2500,148.6746 56.9246,86.5000 15.7500,45.3254 15.7500,105.6746 31.2123,90.2123"/>
  </defs>

  <!-- the 18 faces, grouped by piece -->
  <g data-piece="tip-top (top tip)">
    <polygon id="tip-top-left" fill="hsl(0,58%,38%)" points="-5.2500,-15.8371 5.2500,8.4363 -5.2500,8.4363"/>
    <polygon id="tip-top-right" fill="hsl(0,58%,62%)" points="5.2500,8.4363 9.2189,5.7798 -5.2500,-15.8371"/>
  </g>
  <g data-piece="side-1 (first side / left stem)">
    <polygon id="side1-left" fill="hsl(35,58%,38%)" points="-5.2500,8.4363 0.0000,8.4363 0.0000,123.3254 -5.2500,123.3254"/>
    <polygon id="side1-right" fill="hsl(35,58%,62%)" points="0.0000,8.4363 5.2500,8.4363 5.2500,123.3254 0.0000,123.3254"/>
  </g>
  <g data-piece="joint-1">
    <polygon id="joint1-left" fill="hsl(60,58%,38%)" points="5.2500,123.3254 -5.2500,148.6746 -5.2500,123.3254"/>
    <polygon id="joint1-right" fill="hsl(60,58%,62%)" points="5.2500,123.3254 12.6746,130.7500 -5.2500,148.6746"/>
  </g>
  <g data-piece="side-2 (belly bottom)">
    <polygon id="side2-end" fill="hsl(120,58%,38%)" points="5.2500,123.3254 42.0754,86.5000 45.7877,90.2123 8.9623,127.0377"/>
    <polygon id="side2-down" fill="hsl(120,58%,62%)" points="8.9623,127.0377 45.7877,90.2123 49.5000,93.9246 12.6746,130.7500"/>
  </g>
  <g data-piece="joint-2 (middle joint)">
    <polygon id="joint2-upper" fill="hsl(160,58%,38%)" points="49.5000,79.0754 42.0754,86.5000 56.9246,86.5000"/>
    <polygon id="joint2-lower" fill="hsl(160,58%,62%)" points="49.5000,93.9246 56.9246,86.5000 42.0754,86.5000"/>
  </g>
  <g data-piece="side-3 (second-to-last side)">
    <polygon id="side3-inner" fill="hsl(200,58%,38%)" points="42.0754,86.5000 45.7877,82.7877 29.9623,66.9623 26.2500,70.6746"/>
    <polygon id="side3-outer" fill="hsl(200,58%,62%)" points="45.7877,82.7877 49.5000,79.0754 33.6746,63.2500 29.9623,66.9623"/>
  </g>
  <g data-piece="joint-3 (last joint)">
    <polygon id="joint3-left" fill="hsl(255,58%,38%)" points="26.2500,70.6746 15.7500,45.3254 15.7500,70.6746"/>
    <polygon id="joint3-right" fill="hsl(255,58%,62%)" points="26.2500,70.6746 33.6746,63.2500 15.7500,45.3254"/>
  </g>
  <g data-piece="side-4 (last side)">
    <polygon id="side4-left" fill="hsl(290,58%,38%)" points="15.7500,70.6746 21.0000,70.6746 21.0000,85.2500 15.7500,85.2500"/>
    <polygon id="side4-right" fill="hsl(290,58%,62%)" points="26.2500,85.2500 26.2500,70.6746 21.0000,70.6746 21.0000,85.2500"/>
  </g>
  <g data-piece="tip-belly (belly tip)">
    <polygon id="tipbelly-left" fill="hsl(330,58%,38%)" points="26.2500,85.2500 15.7500,85.2500 15.7500,105.6746"/>
    <polygon id="tipbelly-right" fill="hsl(330,58%,62%)" points="26.2500,85.2500 15.7500,105.6746 31.2123,90.2123"/>
  </g>

  <use href="#b-silhouette" fill="none" stroke="#1a1a1a" stroke-width="0.5" stroke-linejoin="miter" stroke-miterlimit="6"/>

  <g data-layer="regions" stroke="red" stroke-width="0.6" stroke-linejoin="round">
    <polygon id="R1" fill="red" fill-opacity="0.16" points="56.9246,86.5000 15.7500,45.3254 15.7500,16.8307"/>
    <polygon id="R2" fill="red" fill-opacity="0.16" points="15.7500,45.3254 15.7500,16.8307 9.2189,5.7798 5.2500,8.4363 5.2500,34.8254"/>
    <polygon id="R3" fill="red" fill-opacity="0.16" points="15.7500,45.3254 5.2500,34.8254 5.2500,116.1746 15.7500,105.6746"/>
    <polygon id="R4" fill="red" fill-opacity="0.16" points="15.7500,105.6746 5.2500,116.1746 5.2500,123.3254 15.7500,112.8254"/>
    <polygon id="R5" fill="red" fill-opacity="1" points="15.7500,105.6746 15.7500,112.8254 34.7877,93.7877 31.2123,90.2123"/>
    <polygon id="R6" fill="red" fill-opacity="0.16" points="34.7877,93.7877 42.0754,86.5000 38.5000,82.9246 31.2123,90.2123"/>
    <polygon id="R7" fill="red" fill-opacity="0.16" points="31.2123,90.2123 38.5000,82.9246 26.2500,70.6746 26.2500,85.2500"/>
  </g>

  <!-- faces lit from this region, painted white on top -->
  <g data-layer="lit" fill="#ffffff" stroke="#333333" stroke-width="0.3" stroke-linejoin="round">
    <polygon id="lit-side1-right" points="0.0000,8.4363 5.2500,8.4363 5.2500,123.3254 0.0000,123.3254"/>
    <polygon id="lit-side2-end" points="5.2500,123.3254 42.0754,86.5000 45.7877,90.2123 8.9623,127.0377"/>
    <polygon id="lit-side3-inner" points="42.0754,86.5000 45.7877,82.7877 29.9623,66.9623 26.2500,70.6746"/>
    <polygon id="lit-tipbelly-right" points="26.2500,85.2500 15.7500,105.6746 31.2123,90.2123"/>
  </g>
</svg>
